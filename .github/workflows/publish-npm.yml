name: Publish to npm

on:
  push:
    tags:
      - "v*"

# Trusted publishing (OIDC): https://docs.npmjs.com/trusted-publishers
permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    # If you set an "Environment name" on npm Trusted Publisher, uncomment and match exactly:
    # environment: npm-publish

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          check-latest: true
          registry-url: https://registry.npmjs.org

      - name: Ensure npm CLI supports trusted publishing
        run: npm install -g npm@^11.5.1

      - name: Verify package metadata
        run: npm pkg fix

      - name: Publish package (OIDC — no NPM_TOKEN)
        run: npm publish --access public
